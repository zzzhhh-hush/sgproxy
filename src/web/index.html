<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SGPROXY</title>
    <style>
      :root {
        --bg: #f6f3ec;
        --bg-grad-1: rgba(15, 118, 110, 0.12);
        --bg-grad-2: rgba(180, 83, 9, 0.12);
        --panel: rgba(255, 255, 255, 0.85);
        --panel-solid: #ffffff;
        --card-bg: rgba(255, 255, 255, 0.6);
        --ink: #171717;
        --muted: #626262;
        --line: rgba(0, 0, 0, 0.1);
        --accent: #0f766e;
        --accent-soft: rgba(15, 118, 110, 0.12);
        --danger: #b91c1c;
        --warn: #b45309;
        --pill-bg: rgba(0, 0, 0, 0.06);
        --tab-bg: rgba(255, 255, 255, 0.65);
        --tab-active-bg: #ffffff;
        --tab-active-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
        --btn-secondary: rgba(0, 0, 0, 0.06);
        --detail-bg: rgba(255, 255, 255, 0.45);
        --bar-bg: rgba(0, 0, 0, 0.08);
        --shadow: 0 16px 48px rgba(0, 0, 0, 0.08);
        --radius: 18px;
        --radius-sm: 12px;
        --transition: 0.2s ease;
        color-scheme: light;
      }

      html.dark {
        --bg: #0f0f0f;
        --bg-grad-1: rgba(15, 118, 110, 0.15);
        --bg-grad-2: rgba(180, 83, 9, 0.1);
        --panel: rgba(28, 28, 30, 0.9);
        --panel-solid: #1c1c1e;
        --card-bg: rgba(44, 44, 46, 0.6);
        --ink: #e5e5e5;
        --muted: #9a9a9a;
        --line: rgba(255, 255, 255, 0.1);
        --accent: #2dd4bf;
        --accent-soft: rgba(45, 212, 191, 0.12);
        --danger: #f87171;
        --warn: #fbbf24;
        --pill-bg: rgba(255, 255, 255, 0.08);
        --tab-bg: rgba(255, 255, 255, 0.06);
        --tab-active-bg: rgba(255, 255, 255, 0.14);
        --tab-active-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        --btn-secondary: rgba(255, 255, 255, 0.1);
        --detail-bg: rgba(255, 255, 255, 0.05);
        --bar-bg: rgba(255, 255, 255, 0.1);
        --shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
        color-scheme: dark;
      }

      * { box-sizing: border-box; }
      html, body { min-height: 100%; margin: 0; }

      body {
        font-family: -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.5;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, var(--bg-grad-1), transparent 28%),
          radial-gradient(circle at bottom right, var(--bg-grad-2), transparent 30%),
          var(--bg);
        transition: background var(--transition), color var(--transition);
      }

      .page {
        min-height: 100vh;
        padding: 28px 18px 56px;
      }

      .shell {
        max-width: 980px;
        margin: 0 auto;
      }

      /* ── Hero ── */
      .hero {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .subtitle {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .hero-right {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-shrink: 0;
      }

      /* ── Switcher pills ── */
      .switcher {
        display: inline-flex;
        gap: 2px;
        padding: 3px;
        border-radius: 10px;
        background: var(--tab-bg);
      }

      .switcher button {
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 500;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition: all var(--transition);
        font: inherit;
        font-size: 12px;
        line-height: 1.4;
      }

      .switcher button.active {
        background: var(--tab-active-bg);
        color: var(--ink);
        box-shadow: var(--tab-active-shadow);
      }

      .theme-btn {
        width: 34px;
        height: 34px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 0;
        border-radius: 10px;
        background: var(--tab-bg);
        color: var(--muted);
        cursor: pointer;
        font-size: 16px;
        transition: all var(--transition);
      }

      .theme-btn:hover { background: var(--btn-secondary); }

      /* ── Card ── */
      .card {
        background: var(--panel);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 22px;
        transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
      }

      .stack { display: grid; gap: 16px; }
      .hidden { display: none !important; }

      /* ── Tabs ── */
      .tabs {
        display: inline-flex;
        gap: 2px;
        padding: 3px;
        border-radius: 14px;
        background: var(--tab-bg);
      }

      .tab {
        border: 0;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font: inherit;
        background: transparent;
        color: var(--muted);
        padding: 9px 18px;
        font-size: 13px;
        font-weight: 500;
        transition: all var(--transition);
      }

      .tab:hover { color: var(--ink); }

      .tab.active {
        background: var(--tab-active-bg);
        color: var(--ink);
        box-shadow: var(--tab-active-shadow);
      }

      /* ── Nav bar ── */
      .nav-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      .nav-bar .toolbar-actions {
        margin-left: auto;
        display: flex;
        gap: 8px;
      }

      /* ── Input / Textarea ── */
      input, textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        background: var(--panel-solid);
        color: var(--ink);
        font: inherit;
        font-size: 14px;
        outline: none;
        transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
      }

      input:focus, textarea:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      input::placeholder, textarea::placeholder { color: var(--muted); opacity: 0.6; }

      textarea {
        min-height: 100px;
        resize: vertical;
        font-family: "SF Mono", "Cascadia Code", "Fira Code", monospace;
        font-size: 13px;
      }

      /* ── Buttons ── */
      button {
        border: 0;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font: inherit;
        padding: 9px 16px;
        font-size: 13px;
        font-weight: 500;
        background: var(--accent);
        color: white;
        transition: all var(--transition);
      }

      button:hover { opacity: 0.88; }
      button:active { transform: scale(0.97); }

      button.secondary {
        background: var(--btn-secondary);
        color: var(--ink);
      }

      button.secondary:hover { opacity: 1; background: var(--line); }

      button.danger { background: var(--danger); color: white; }

      .toolbar, .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      /* ── Status banner ── */
      .status {
        padding: 10px 14px;
        border-radius: var(--radius-sm);
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 13px;
        white-space: pre-wrap;
        transition: background var(--transition), color var(--transition);
      }

      .status.error {
        background: rgba(185, 28, 28, 0.1);
        color: var(--danger);
      }

      .grid { display: grid; gap: 12px; }

      /* ── Credential card ── */
      .credential {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--card-bg);
        padding: 16px;
        display: grid;
        gap: 12px;
        transition: background var(--transition), border-color var(--transition);
      }

      .credential-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
        flex-wrap: wrap;
      }

      .credential-title {
        font-size: 15px;
        font-weight: 600;
        word-break: break-all;
      }

      .meta {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 6px;
      }

      .pill {
        border-radius: 999px;
        padding: 3px 10px;
        font-size: 11px;
        font-weight: 500;
        background: var(--pill-bg);
        color: var(--muted);
        white-space: nowrap;
      }

      .pill.healthy { background: var(--accent-soft); color: var(--accent); }
      .pill.warn { background: rgba(180, 83, 9, 0.12); color: var(--warn); }
      .pill.dead { background: rgba(185, 28, 28, 0.12); color: var(--danger); }

      /* ── Details ── */
      details {
        border: 1px solid var(--line);
        border-radius: var(--radius-sm);
        background: var(--detail-bg);
        padding: 10px 14px;
        transition: background var(--transition), border-color var(--transition);
      }

      summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 13px;
        user-select: none;
        list-style: none;
      }

      summary::-webkit-details-marker { display: none; }
      summary::before { content: "\25B8\00a0"; font-size: 10px; display: inline-block; transition: transform var(--transition); }
      details[open] summary::before { transform: rotate(90deg); }

      pre {
        margin: 10px 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "SF Mono", "Cascadia Code", monospace;
        font-size: 12px;
        line-height: 1.6;
      }

      /* ── Usage bars ── */
      .usage-list { display: grid; gap: 10px; }
      .usage-item { display: grid; gap: 4px; }

      .usage-label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
      }

      .bar {
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: var(--bar-bg);
      }

      .fill {
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #0f766e, #14b8a6);
        transition: width 0.4s ease;
      }

      .usage-note {
        font-size: 11px;
        color: var(--muted);
      }

      /* ── Section title ── */
      .section-title {
        font-size: 15px;
        font-weight: 600;
        margin: 0;
      }

      /* ── Login center ── */
      .login-wrap {
        max-width: 420px;
        margin: 48px auto 0;
      }

      /* ── Responsive ── */
      @media (max-width: 720px) {
        .page { padding: 16px 12px 32px; }
        .hero { flex-direction: column; }
        .hero-right { width: 100%; justify-content: flex-start; }
        .nav-bar .toolbar-actions { margin-left: 0; width: 100%; }
        .credential-head { flex-direction: column; align-items: stretch; }
        .credential-head .row { justify-content: flex-start; }
        .tabs { width: 100%; }
        .tab { flex: 1; text-align: center; padding: 9px 10px; font-size: 12px; }
      }

      /* ── Animation ── */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .card { animation: fadeIn 0.25s ease-out; }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="shell">
        <div class="hero">
          <div>
            <h1>sgproxy</h1>
            <div class="subtitle">LeenHawk &lt;leenhawk@leenhawk.com&gt;</div>
          </div>
          <div class="hero-right">
            <div class="switcher">
              <button id="langZh" class="active">中文</button>
              <button id="langEn">EN</button>
            </div>
            <button class="theme-btn" id="themeToggle" title="Toggle theme">
              <span id="themeIcon">&#9790;</span>
            </button>
          </div>
        </div>

        <!-- Usage (public) page -->
        <div id="usagePage" class="card stack hidden">
          <div id="publicStatus" class="status">Loading...</div>
          <div id="publicList" class="grid"></div>
        </div>

        <!-- Login page -->
        <div id="loginPage" class="login-wrap hidden">
          <div class="card stack">
            <div class="section-title" id="loginTitle"></div>
            <input id="tokenInput" placeholder="Bearer token" />
            <div class="row">
              <button id="loginBtn"></button>
              <button id="clearBtn" class="secondary"></button>
            </div>
            <div id="loginStatus" class="status"></div>
          </div>
        </div>

        <!-- Admin page -->
        <div id="adminPage" class="hidden">
          <div class="nav-bar">
            <div class="tabs">
              <button class="tab active" id="credentialsTab"></button>
              <button class="tab" id="oauthTab">OAuth</button>
            </div>
            <div class="toolbar-actions">
              <button id="refreshBtn" class="secondary"></button>
              <button id="logoutBtn" class="secondary"></button>
            </div>
          </div>

          <div id="globalStatus" class="status hidden" style="margin-bottom:14px"></div>

          <!-- Credentials panel -->
          <div id="credentialsPanel" class="card stack">
            <div class="stack">
              <div class="section-title" id="importTitle"></div>
              <textarea id="importInput" placeholder='{"access_token":"..."}'></textarea>
              <div class="row">
                <button id="importBtn"></button>
              </div>
            </div>
            <div id="credentialList" class="grid"></div>
          </div>

          <!-- OAuth panel -->
          <div id="oauthPanel" class="card stack hidden">
            <div class="section-title" id="oauthTitle"></div>
            <div class="row">
              <button id="oauthStartBtn"></button>
            </div>
            <textarea id="oauthCallbackInput"></textarea>
            <div class="row">
              <button id="oauthCallbackBtn"></button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const MODE = "__SGPROXY_VIEW_MODE__";
      const TOKEN_KEY = "sgproxy_admin_token";
      const LANG_KEY = "sgproxy_lang";
      const THEME_KEY = "sgproxy_theme";
      let lang = localStorage.getItem(LANG_KEY) || "zh";

      /* ── Theme ── */
      function getPreferredTheme() {
        const stored = localStorage.getItem(THEME_KEY);
        if (stored === "dark" || stored === "light") return stored;
        return window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }

      function applyTheme(theme) {
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.getElementById("themeIcon").textContent = theme === "dark" ? "\u2600" : "\u263E";
        localStorage.setItem(THEME_KEY, theme);
      }

      applyTheme(getPreferredTheme());

      document.getElementById("themeToggle").addEventListener("click", () => {
        const next = document.documentElement.classList.contains("dark") ? "light" : "dark";
        applyTheme(next);
      });

      /* ── I18N ── */
      const I18N = {
        zh: {
          login: "登录",
          logout: "退出",
          clear: "清空",
          loginHint: "输入 ADMIN_TOKEN。",
          refresh: "刷新",
          credentials: "凭证",
          oauth: "OAuth",
          importTitle: "导入凭证 JSON",
          importBtn: "导入",
          oauthTitle: "OAuth 导入",
          oauthOpen: "打开授权页",
          oauthFinish: "完成导入",
          oauthPlaceholder: "粘贴 callback URL 或 code",
          enabled: "已启用",
          disabled: "已停用",
          copy: "复制",
          copied: "已复制",
          delete: "删除",
          enable: "启用",
          disable: "停用",
          credentialJson: "凭证 JSON",
          publicReady: "公开限额页",
          imported: "导入完成",
          opened: "已打开授权页",
          refreshed: "已刷新",
          unauthorized: "未授权",
          noCredentials: "暂无凭证",
          lastError: "错误",
          resetAt: "将重置于",
          orderPrefix: "顺序",
          statusHealthy: "健康",
          statusCooldown5h: "五小时冷却",
          statusCooldown7d: "七天冷却",
          statusDead: "死亡"
        },
        en: {
          login: "Login",
          logout: "Logout",
          clear: "Clear",
          loginHint: "Enter ADMIN_TOKEN.",
          refresh: "Refresh",
          credentials: "Credentials",
          oauth: "OAuth",
          importTitle: "Import Credential JSON",
          importBtn: "Import",
          oauthTitle: "OAuth Import",
          oauthOpen: "Open Auth Page",
          oauthFinish: "Complete Import",
          oauthPlaceholder: "Paste callback URL or code",
          enabled: "Enabled",
          disabled: "Disabled",
          copy: "Copy",
          copied: "Copied",
          delete: "Delete",
          enable: "Enable",
          disable: "Disable",
          credentialJson: "Credential JSON",
          publicReady: "Public quota page",
          imported: "Imported",
          opened: "Auth page opened",
          refreshed: "Refreshed",
          unauthorized: "Unauthorized",
          noCredentials: "No credentials",
          lastError: "Error",
          resetAt: "Resets at",
          orderPrefix: "Order",
          statusHealthy: "Healthy",
          statusCooldown5h: "5h Cooldown",
          statusCooldown7d: "7d Cooldown",
          statusDead: "Dead"
        }
      };

      /* ── DOM refs ── */
      const els = {
        loginPage: document.getElementById("loginPage"),
        adminPage: document.getElementById("adminPage"),
        usagePage: document.getElementById("usagePage"),
        loginTitle: document.getElementById("loginTitle"),
        loginBtn: document.getElementById("loginBtn"),
        clearBtn: document.getElementById("clearBtn"),
        loginStatus: document.getElementById("loginStatus"),
        tokenInput: document.getElementById("tokenInput"),
        refreshBtn: document.getElementById("refreshBtn"),
        logoutBtn: document.getElementById("logoutBtn"),
        importTitle: document.getElementById("importTitle"),
        importInput: document.getElementById("importInput"),
        importBtn: document.getElementById("importBtn"),
        credentialList: document.getElementById("credentialList"),
        oauthTitle: document.getElementById("oauthTitle"),
        oauthStartBtn: document.getElementById("oauthStartBtn"),
        oauthCallbackInput: document.getElementById("oauthCallbackInput"),
        oauthCallbackBtn: document.getElementById("oauthCallbackBtn"),
        credentialsTab: document.getElementById("credentialsTab"),
        oauthTab: document.getElementById("oauthTab"),
        credentialsPanel: document.getElementById("credentialsPanel"),
        oauthPanel: document.getElementById("oauthPanel"),
        globalStatus: document.getElementById("globalStatus"),
        publicStatus: document.getElementById("publicStatus"),
        publicList: document.getElementById("publicList"),
        langZh: document.getElementById("langZh"),
        langEn: document.getElementById("langEn")
      };

      /* ── Helpers ── */
      function t(key) {
        return (I18N[lang] && I18N[lang][key]) || key;
      }

      function setStatus(target, message, isError = false) {
        if (!target) return;
        target.textContent = message;
        target.classList.toggle("error", isError);
        target.classList.remove("hidden");
      }

      function authHeaders() {
        const token = localStorage.getItem(TOKEN_KEY) || "";
        return token ? { Authorization: `Bearer ${token}` } : {};
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            "content-type": "application/json",
            ...authHeaders(),
            ...(options.headers || {})
          }
        });
        const text = await response.text();
        let data = null;
        if (text) {
          try { data = JSON.parse(text); } catch { data = text; }
        }
        if (!response.ok) {
          throw new Error((data && data.error) || text || response.statusText);
        }
        return data;
      }

      /* ── Usage rendering ── */
      function usageRows(usage) {
        const buckets = [
          ["five_hour", "5h"],
          ["seven_day", "7d"],
          ["seven_day_sonnet", "7d sonnet"]
        ];
        return buckets.map(([key, label]) => {
          const item = usage[key] || {};
          const pct = Number(item.utilization_pct || 0);
          const reset = formatResetTime(item.resets_at);
          return `
            <div class="usage-item">
              <div class="usage-label">
                <span>${label}</span>
                <span>${pct}%</span>
              </div>
              <div class="bar"><div class="fill" style="width:${Math.max(0, Math.min(100, pct))}%"></div></div>
              <div class="usage-note">${escapeHtml(reset)}</div>
            </div>
          `;
        }).join("");
      }

      function statusClass(status) {
        if (status === "healthy") return "healthy";
        if (status === "dead") return "dead";
        return "warn";
      }

      function statusLabel(status) {
        const map = {
          healthy: t("statusHealthy"),
          cooldown_5h: t("statusCooldown5h"),
          cooldown_7d: t("statusCooldown7d"),
          dead: t("statusDead")
        };
        return map[status] || status || "";
      }

      function credentialCard(item) {
        const enabled = item.enabled ? t("enabled") : t("disabled");
        const toggleAction = item.enabled ? "disable" : "enable";
        const toggleLabel = item.enabled ? t("disable") : t("enable");
        const jsonText = JSON.stringify(item.json || {}, null, 2);
        const email = item.user_email || item.account_uuid || item.id;
        return `
          <div class="credential">
            <div class="credential-head">
              <div>
                <div class="credential-title">${escapeHtml(email)}</div>
                <div class="meta">
                  <span class="pill ${statusClass(item.status)}">${escapeHtml(statusLabel(item.status))}</span>
                  <span class="pill">${t("orderPrefix")}: ${item.order ?? "-"}</span>
                  <span class="pill">${enabled}</span>
                </div>
              </div>
              <div class="row">
                <button class="secondary" data-copy='${encodeURIComponent(jsonText)}'>${t("copy")}</button>
                <button class="secondary" data-toggle="${item.id}" data-action="${toggleAction}">${toggleLabel}</button>
                <button class="danger" data-delete="${item.id}">${t("delete")}</button>
              </div>
            </div>
            ${item.last_error ? `<div class="usage-note">${t("lastError")}: ${escapeHtml(item.last_error)}</div>` : ""}
            <div class="usage-list">${usageRows(item.usage || {})}</div>
            <details>
              <summary>${t("credentialJson")}</summary>
              <pre>${escapeHtml(jsonText)}</pre>
            </details>
          </div>
        `;
      }

      function escapeHtml(input) {
        return String(input)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function formatLocalDateTime(value) {
        if (!value) return "-";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        const pad = (n) => String(n).padStart(2, "0");
        return [
          date.getFullYear(),
          pad(date.getMonth() + 1),
          pad(date.getDate())
        ].join("-") + " " + [
          pad(date.getHours()),
          pad(date.getMinutes()),
          pad(date.getSeconds())
        ].join(":");
      }

      function formatResetTime(value) {
        const formatted = formatLocalDateTime(value);
        return formatted === "-" ? formatted : `${t("resetAt")} ${formatted}`;
      }

      /* ── Data loading ── */
      async function loadCredentials() {
        const [credentials, usage] = await Promise.all([
          api("/api/credentials"),
          api("/api/credentials/usage")
        ]);
        const usageMap = new Map((usage || []).map((item) => [item.id, item]));
        const merged = (credentials || []).map((item) => ({
          ...item,
          ...(usageMap.get(item.id) || {}),
          json: {
            access_token: item.access_token,
            refresh_token: item.refresh_token,
            expires_at_unix_ms: item.expires_at_unix_ms,
            user_email: item.user_email,
            account_uuid: item.account_uuid,
            organization_uuid: item.organization_uuid,
            subscription_type: item.subscription_type,
            rate_limit_tier: item.rate_limit_tier,
            status: item.status
          }
        }));
        els.credentialList.innerHTML = merged.length
          ? merged.map(credentialCard).join("")
          : `<div class="status">${t("noCredentials")}</div>`;
      }

      async function loadPublic() {
        const items = await api("/api/public/credentials", {
          headers: { "content-type": "application/json" }
        });
        els.publicList.innerHTML = (items || []).map(credentialCard).join("");
        setStatus(els.publicStatus, t("publicReady"));
      }

      /* ── Auth ── */
      async function login() {
        localStorage.setItem(TOKEN_KEY, els.tokenInput.value.trim());
        try {
          await api("/api/credentials");
          showAdmin();
          await refreshAll();
        } catch (error) {
          localStorage.removeItem(TOKEN_KEY);
          setStatus(els.loginStatus, error.message || t("unauthorized"), true);
        }
      }

      function logout() {
        localStorage.removeItem(TOKEN_KEY);
        els.tokenInput.value = "";
        showLogin();
      }

      function showLogin() {
        els.loginPage.classList.remove("hidden");
        els.adminPage.classList.add("hidden");
      }

      function showAdmin() {
        els.loginPage.classList.add("hidden");
        els.adminPage.classList.remove("hidden");
      }

      /* ── Tab switching ── */
      function setTab(tab) {
        const isCredentials = tab === "credentials";
        els.credentialsTab.classList.toggle("active", isCredentials);
        els.oauthTab.classList.toggle("active", !isCredentials);
        els.credentialsPanel.classList.toggle("hidden", !isCredentials);
        els.oauthPanel.classList.toggle("hidden", isCredentials);
      }

      async function refreshAll() {
        try {
          await loadCredentials();
          setStatus(els.globalStatus, t("refreshed"));
        } catch (error) {
          setStatus(els.globalStatus, error.message, true);
        }
      }

      /* ── Language ── */
      function applyLanguage() {
        localStorage.setItem(LANG_KEY, lang);
        els.langZh.classList.toggle("active", lang === "zh");
        els.langEn.classList.toggle("active", lang === "en");
        els.loginTitle.textContent = t("login");
        els.loginBtn.textContent = t("login");
        els.clearBtn.textContent = t("clear");
        els.loginStatus.textContent = t("loginHint");
        els.refreshBtn.textContent = t("refresh");
        els.logoutBtn.textContent = t("logout");
        els.credentialsTab.textContent = t("credentials");
        els.oauthTab.textContent = t("oauth");
        els.importTitle.textContent = t("importTitle");
        els.importBtn.textContent = t("importBtn");
        els.oauthTitle.textContent = t("oauthTitle");
        els.oauthStartBtn.textContent = t("oauthOpen");
        els.oauthCallbackBtn.textContent = t("oauthFinish");
        els.oauthCallbackInput.placeholder = t("oauthPlaceholder");
      }

      /* ── Event listeners ── */
      els.langZh.addEventListener("click", async () => {
        lang = "zh";
        applyLanguage();
        await refreshVisible();
      });
      els.langEn.addEventListener("click", async () => {
        lang = "en";
        applyLanguage();
        await refreshVisible();
      });
      els.loginBtn.addEventListener("click", login);
      els.clearBtn.addEventListener("click", () => {
        els.tokenInput.value = "";
        localStorage.removeItem(TOKEN_KEY);
      });
      els.refreshBtn.addEventListener("click", refreshAll);
      els.logoutBtn.addEventListener("click", logout);
      els.credentialsTab.addEventListener("click", () => setTab("credentials"));
      els.oauthTab.addEventListener("click", () => setTab("oauth"));

      els.importBtn.addEventListener("click", async () => {
        try {
          const payload = JSON.parse(els.importInput.value || "{}");
          await api("/api/credentials", {
            method: "POST",
            body: JSON.stringify(payload)
          });
          els.importInput.value = "";
          await refreshAll();
          setStatus(els.globalStatus, t("imported"));
        } catch (error) {
          setStatus(els.globalStatus, error.message, true);
        }
      });

      els.oauthStartBtn.addEventListener("click", async () => {
        try {
          const payload = await api("/api/oauth/start", {
            method: "POST",
            body: "{}"
          });
          window.open(payload.auth_url, "_blank", "noopener");
          setStatus(els.globalStatus, t("opened"));
        } catch (error) {
          setStatus(els.globalStatus, error.message, true);
        }
      });

      els.oauthCallbackBtn.addEventListener("click", async () => {
        try {
          await api("/api/oauth/callback", {
            method: "POST",
            body: JSON.stringify({ callback_url: els.oauthCallbackInput.value })
          });
          els.oauthCallbackInput.value = "";
          await refreshAll();
          setStatus(els.globalStatus, t("imported"));
          setTab("credentials");
        } catch (error) {
          setStatus(els.globalStatus, error.message, true);
        }
      });

      els.credentialList.addEventListener("click", async (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        try {
          if (button.dataset.copy) {
            await navigator.clipboard.writeText(decodeURIComponent(button.dataset.copy));
            setStatus(els.globalStatus, t("copied"));
            return;
          }
          if (button.dataset.delete) {
            await api(`/api/credentials/${button.dataset.delete}`, { method: "DELETE" });
            await refreshAll();
            return;
          }
          if (button.dataset.toggle) {
            await api(`/api/credentials/${button.dataset.toggle}/${button.dataset.action}`, {
              method: "POST",
              body: "{}"
            });
            await refreshAll();
          }
        } catch (error) {
          setStatus(els.globalStatus, error.message, true);
        }
      });

      async function refreshVisible() {
        if (MODE === "usage") {
          await loadPublic();
        } else if (localStorage.getItem(TOKEN_KEY)) {
          await refreshAll();
        }
      }

      /* ── Boot ── */
      async function boot() {
        applyLanguage();
        if (MODE === "usage") {
          els.usagePage.classList.remove("hidden");
          await loadPublic();
          return;
        }
        const token = localStorage.getItem(TOKEN_KEY) || "";
        els.tokenInput.value = token;
        if (token) {
          try {
            await api("/api/credentials");
            showAdmin();
            await refreshAll();
            return;
          } catch (_) {
            localStorage.removeItem(TOKEN_KEY);
          }
        }
        showLogin();
      }

      boot();
    </script>
  </body>
</html>
